<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBook</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">

        <div class="logo">
            <span class="logo-icon">🍽</span>
            <span class="logo-text">Adetoro Ololade</span>
        </div>

        <nav class="nav" id="nav">
            <a href="#" class="nav-link">Home</a>
            <a href="#" class="nav-link">Favorites</a>
            <a href="#" class="nav-link">Shopping List</a>
        </nav>

        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>

    </header>

    <!-- HERO SECTION -->
    <section class="hero">

        <h1 class="hero-title">
            Discover & Save <span>Delicious Recipes</span>
        </h1>

        <p class="hero-subtitle">
            Cook smarter. Eat better. Plan your meals with ease.
        </p>

    </section>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- CONTROLS -->
        <div class="controls">

            <input
                type="text"
                id="searchInput"
                placeholder="Search recipes..."
                class="search-input"
            >

            <select id="categoryFilter" class="category-select">
                <option value="all">All Categories</option>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
                <option value="dessert">Dessert</option>
            </select>

            <button class="btn-add" id="openFormBtn">
                + Add Recipe
            </button>

        </div>

        <!-- RECIPE GRID -->
        <div class="recipe-grid" id="recipeGrid"></div>

    </main>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">

        <div class="modal">

            <button class="modal-close" id="modalClose">✕</button>

            <h2 id="modalTitle">Add New Recipe</h2>

            <!-- Recipe Name -->
            <div class="form-group">

                <label for="recipeName">Recipe Name</label>

                <input
                    type="text"
                    id="recipeName"
                    placeholder="e.g. Jollof Rice"
                >

            </div>

            <!-- Category -->
            <div class="form-group">

                <label for="recipeCategory">Category</label>

                <select id="recipeCategory">
                    <option value="breakfast">Breakfast</option>
                    <option value="lunch">Lunch</option>
                    <option value="dinner">Dinner</option>
                    <option value="snack">Snack</option>
                    <option value="dessert">Dessert</option>
                </select>

            </div>

            <!-- Cuisine -->
            <div class="form-group">

                <label for="recipeCuisine">Cuisine</label>

                <input
                    type="text"
                    id="recipeCuisine"
                    placeholder="e.g. Nigerian, Italian"
                >

            </div>

            <!-- Ingredients -->
            <div class="form-group">

                <label for="recipeIngredients">
                    Ingredients (one per line)
                </label>

                <textarea
                    id="recipeIngredients"
                    rows="5"
                    placeholder="Rice&#10;Tomatoes&#10;Onions"
                ></textarea>

            </div>

            <!-- Instructions -->
            <div class="form-group">

                <label for="recipeInstructions">Instructions</label>

                <textarea
                    id="recipeInstructions"
                    rows="4"
                    placeholder="Step by step..."
                ></textarea>

            </div>

            <!-- Emoji -->
            <div class="form-group">

                <label for="recipeEmoji">Emoji (optional)</label>

                <input
                    type="text"
                    id="recipeEmoji"
                    placeholder="e.g. 🍚"
                >

            </div>

            <!-- Save Button -->
            <button class="btn-submit" id="saveRecipeBtn">
                Save Recipe
            </button>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script src="app.js"></script>

</body>
</html>
